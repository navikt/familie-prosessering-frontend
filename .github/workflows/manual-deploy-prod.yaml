name: Manual deploy to prod

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Hvilket prod-miljø skal deployes?'
        required: true
        type: choice
        options:
          - teamfamilie
          - tilleggsstonader
          - tilbake

jobs:
  build:
    name: Build and push Docker container
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn
          registry-url: "https://npm.pkg.github.com"
      - name: Yarn install
        run: yarn --prefer-offline --frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Yarn build
        run: yarn build
      - name: Build and publish Docker image to GAR
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # ratchet:nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: teamfamilie

  deploy:
    name: Deploy to prod - ${{ inputs.namespace }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
      - name: Finn riktig .nais-fil for valgt namespace
        id: resource
        run: |
          case "${{ inputs.namespace }}" in
            teamfamilie) echo "path=.nais/app-prod.yaml" >> "$GITHUB_OUTPUT" ;;
            tilleggsstonader) echo "path=.nais/app-prod-tilleggsstonader.yaml" >> "$GITHUB_OUTPUT" ;;
            tilbake) echo "path=.nais/app-prod-tilbake.yaml" >> "$GITHUB_OUTPUT" ;;
            *) echo "Ukjent namespace: ${{ inputs.namespace }}"; exit 1 ;;
          esac
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: ${{ steps.resource.outputs.path }}
          VAR: image=${{ needs.build.outputs.image }}
